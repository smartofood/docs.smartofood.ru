        id:
          type: string
          format: uuid
          description: UUID события
          example: 3f6f3f7d-52c0-4cb8-9d3a-9b894b1bb3b3
        created_at:
          type: string
          format: date-time
          description: Время создания события
          example: '2026-05-25T07:20:00Z'
        object:
          $ref: '#/components/schemas/OrderWebhookObject'
