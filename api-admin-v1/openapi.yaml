        - enabled
        - event_types
      properties:
        id:
          type: integer
          description: ID адреса
          example: 10
        url:
          type: string
          format: uri
          maxLength: 255
          description: URL адреса, на который отправляются HTTP-уведомления
          example: https://example.com/smartofood/webhook
        enabled:
          type: boolean
          description: Признак включенного адреса
          example: true
        event_types:
          type: array
          description: Типы событий, которые получает адрес
          items:
            type: string
          example:
            - order.accepted
            - order.canceled
            - order.closed
    WebhookEndpointSaveRequest:
      type: object
      required:
        - url
        - event_types
      properties:
        url:
          type: string
          format: uri
          maxLength: 255
          description: Уникальный URL адреса, на который отправляются HTTP-уведомления
          example: https://example.com/smartofood/webhook
        secret:
          type: string
          maxLength: 256
          pattern: '^[A-Za-z0-9_-]{1,256}$'
          description: Необязательный секретный токен для заголовка X-Smartofood-Webhook-Secret-Token
          example: whsec_123
        enabled:
          type: boolean
          description: Включить адрес. Если поле не передано при создании, адрес создается включенным.
          example: true
        event_types:
          type: array
          description: Типы событий
          items:
            type: string
            pattern: '^order\.[a-z_]+$'
          example:
            - order.accepted
            - order.canceled
            - order.closed
    WebhookEndpointUpdateRequest:
      type: object
      required:
        - id
      properties:
        id:
          type: integer
          minimum: 1
          description: ID адреса
          example: 10
        url:
          type: string
          format: uri
          maxLength: 255
          description: Уникальный URL адреса, на который отправляются HTTP-уведомления
          example: https://example.com/smartofood/webhook
        secret:
          type: string
          maxLength: 256
          pattern: '^[A-Za-z0-9_-]{1,256}$'
          description: Необязательный секретный токен для заголовка X-Smartofood-Webhook-Secret-Token
          example: whsec_123
        enabled:
          type: boolean
          description: Включить адрес
          example: true
        event_types:
          type: array
          description: Типы событий
          items:
            type: string
            pattern: '^order\.[a-z_]+$'
          example:
            - order.accepted
            - order.canceled
            - order.closed
    OrderWebhookNotification:
      type: object
      required:
        - type
        - event
        - id
        - created_at
        - object
      properties:
        type:
          type: string
          enum:
            - notification
          description: Тип payload
          example: notification
        event:
          type: string
          description: Тип события
          enum:
            - order.accepted
            - order.cooking
            - order.packing
            - order.waiting
            - order.done
            - order.delivering
            - order.delivered
            - order.pickedup
