openapi: 3.1.0

info:
  title: Smartofood Admin API
  description: Административный API Smartofood для внешних интеграций панели.
  version: 1.1.0
  contact:
    url: https://smartofood.ru
    email: support@smartofood.ru
  license:
    url: https://smartofood.ru/license.pdf
    name: Публичная оферта
  x-logo:
    url: https://docs.smartofood.ru/images/logo.png
    href: https://docs.smartofood.ru/api-admin-v1/

servers:
  - url: https://{domain}/api/admin/v1
    description: Сайт Smartofood
    variables:
      domain:
        default: demo.smartofood.ru

x-tagGroups:
  - name: Общие
    tags:
      - Пинг API
  - name: Авторизация
    tags:
      - Авторизация
      - Коды авторизации
  - name: Данные
    tags:
      - Заказы
      - Гости
  - name: Управление
    tags:
      - Настройки
      - Вебхуки

paths:
  /ping:
    get:
      tags:
        - Пинг API
      summary: Пинг API
      description: Проверяет доступность admin API и валидность переданного access, manual или support JWT.
      security:
        - BearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/Lang'
      responses:
        '200':
          description: API доступен
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                properties:
                  status:
                    type: string
                    example: OK
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
  /auth/login:
    post:
      tags:
        - Авторизация
      summary: Авторизация по email и паролю
      description: Возвращает access и refresh token для активного пользователя панели. Если пользователю требуется двухэтапная авторизация, возвращает 403 с is_two_step_auth. Если пользователю требуется обязательная смена пароля, возвращает 403 с password_change_token для метода смены пароля. В production-запросах требуется валидный ответ SmartCaptcha.
      parameters:
        - $ref: '#/components/parameters/Lang'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - sec_response
              properties:
                email:
                  type: string
                  format: email
                  description: Email пользователя панели
                  example: admin@example.com
                password:
                  type: string
                  format: password
                  description: Пароль пользователя панели
                  example: Password1
                sec_response:
                  type: string
                  description: Ответ Yandex SmartCaptcha
                  example: 0.23Yx...
      responses:
        '200':
          $ref: '#/components/responses/AuthSuccess'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          description: Доступ запрещен, требуется двухэтапная авторизация или обязательная смена пароля
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/Error'
                  - $ref: '#/components/schemas/TwoStepAuthRequired'
                  - $ref: '#/components/schemas/PasswordChangeRequired'
              examples:
                twoStepRequired:
                  summary: Требуется двухэтапная авторизация
                  value:
                    error: Требуется двухэтапная авторизация
                    code: 403
                    is_two_step_auth: true
                passwordChangeRequired:
                  summary: Требуется смена пароля
                  value:
                    error: Требуется смена пароля
                    code: 403
                    is_force_change_pwd: true
                    password_change_token: eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9...
                forbidden:
                  summary: Доступ запрещен
                  value:
                    error: Доступ запрещен
                    code: 403
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
  /auth/confirm:
    post:
      tags:
        - Авторизация
      summary: Подтверждение двухэтапной авторизации
      description: Подтверждает код двухэтапной авторизации и возвращает access и refresh token. Если после подтверждения пользователю требуется обязательная смена пароля, возвращает 403 с password_change_token для метода смены пароля.
      parameters:
        - $ref: '#/components/parameters/Lang'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - code
                - sec_response
              properties:
                email:
                  type: string
                  format: email
                  description: Email пользователя панели
                  example: admin@example.com
                code:
                  type: string
                  description: Код подтверждения из письма
                  example: '123456'
                sec_response:
                  type: string
                  description: Ответ Yandex SmartCaptcha
                  example: 0.23Yx...
      responses:
        '200':
          $ref: '#/components/responses/AuthSuccess'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          description: Доступ запрещен или требуется обязательная смена пароля
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/Error'
                  - $ref: '#/components/schemas/PasswordChangeRequired'
              examples:
                passwordChangeRequired:
                  summary: Требуется смена пароля
                  value:
                    error: Требуется смена пароля
                    code: 403
                    is_force_change_pwd: true
                    password_change_token: eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9...
                forbidden:
                  summary: Доступ запрещен
                  value:
                    error: Доступ запрещен
                    code: 403
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
  /auth/change-password:
    post:
      tags:
        - Авторизация
      summary: Обязательная смена пароля
      description: Меняет пароль пользователя по password_change_token, полученному при авторизации с обязательной сменой пароля, и возвращает access и refresh token. В production-запросах требуется валидный ответ SmartCaptcha.
      parameters:
        - $ref: '#/components/parameters/Lang'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password_change_token
                - pwd1
                - pwd2
                - sec_response
              properties:
                password_change_token:
                  type: string
                  description: Короткоживущий JWT token для обязательной смены пароля
                  example: eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9...
                pwd1:
                  type: string
                  format: password
                  description: Новый пароль
                  example: NewPassword1
                pwd2:
                  type: string
                  format: password
                  description: Повтор нового пароля
                  example: NewPassword1
                sec_response:
                  type: string
                  description: Ответ Yandex SmartCaptcha
                  example: 0.23Yx...
      responses:
        '200':
          $ref: '#/components/responses/AuthSuccess'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
  /auth/recovery:
    post:
      tags:
        - Авторизация
      summary: Восстановление пароля
      description: Отправляет пользователю панели новый пароль по email. В production-запросах требуется валидный ответ SmartCaptcha.
      parameters:
        - $ref: '#/components/parameters/Lang'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - sec_response
              properties:
                email:
                  type: string
                  format: email
                  description: Email пользователя панели
                  example: admin@example.com
                sec_response:
                  type: string
                  description: Ответ Yandex SmartCaptcha
                  example: 0.23Yx...
      responses:
        '200':
          description: Новый пароль отправлен
          content:
            application/json:
              schema:
                type: 'null'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
  /auth/refresh:
    post:
      tags:
        - Авторизация
      summary: Обновление токенов
      description: Обменивает действующий refresh token на новую пару access и refresh token. Использованный refresh token отзывается.
      parameters:
        - $ref: '#/components/parameters/Lang'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refresh_token
              properties:
                refresh_token:
                  type: string
                  description: Refresh token
                  example: 5811b81f0f19978e9f9d0be3b41e2f5b
      responses:
        '200':
          $ref: '#/components/responses/AuthSuccess'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
  /auth/logout:
    post:
      tags:
        - Авторизация
      summary: Выход
      description: Отзывает refresh token, связанный с текущим access JWT. Manual token через этот метод не отзывается.
      security:
        - BearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/Lang'
      responses:
        '200':
          description: Успешный выход
          content:
            application/json:
              schema:
                type: 'null'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
  /settings:
    get:
      tags:
        - Настройки
      summary: Список настроек
      description: Возвращает настройки admin API в форматированном виде. Если передан search, возвращает настройки с указанным префиксом ключа. Метод доступен администраторам.
      security:
        - BearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/Lang'
        - name: search
          in: query
          description: Префикс ключей настроек для поиска
          required: false
          schema:
            type: string
          example: COMMON_
      responses:
        '200':
          description: Массив форматированных настроек
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  oneOf:
                    - $ref: '#/components/schemas/Setting'
                    - type: string
              example:
                COMMON_ROWS_PER_PAGE:
                  name: Количество записей на странице
                  value: '50'
                  raw: '50'
                  type: number
                  default: '50'
                COMMON_EVENT_PERIOD:
                  name: Период хранения системных событий
                  value: Месяц
                  raw: month
                  type: select
                  default: month
                  data:
                    day: День
                    week: Неделя
                    month: Месяц
                    year: Год
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
    post:
      tags:
        - Настройки
      summary: Сохранение настройки
      description: Сохраняет значение существующей настройки admin API. Метод доступен администраторам.
      security:
        - BearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/Lang'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - key
                - value
              properties:
                key:
                  type: string
                  description: Ключ настройки
                  example: COMMON_ROWS_PER_PAGE
                value:
                  oneOf:
                    - type: string
                    - type: array
                      items:
                        type: string
                  description: Новое значение настройки
                  example: '100'
      responses:
        '200':
          description: Форматированное значение обновленной настройки
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  oneOf:
                    - $ref: '#/components/schemas/Setting'
                    - type: string
              example:
                COMMON_ROWS_PER_PAGE:
                  name: Количество записей на странице
                  value: '100'
                  raw: '100'
                  type: number
                  default: '50'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
  /orders:
    get:
      tags:
        - Заказы
      summary: Поиск заказов
      description: Возвращает список обработанных заказов панели. Новые необработанные заказы не попадают в выдачу.
      security:
        - BearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/Lang'
        - in: query
          name: date_from
          schema:
            type: string
            format: date
            example: '2026-05-01'
          description: Начальная дата создания заказа. Передается вместе с date_to.
        - in: query
          name: date_to
          schema:
            type: string
            format: date
            example: '2026-05-25'
          description: Конечная дата создания заказа. Передается вместе с date_from.
        - in: query
          name: city_id
          schema:
            type: integer
            minimum: 1
          description: ID города
        - in: query
          name: guest_id
          schema:
            type: integer
            minimum: 1
          description: ID гостя
        - in: query
          name: shop_id
          schema:
            type: integer
            minimum: 1
          description: ID заведения
        - in: query
          name: order_type
          schema:
            type: string
            enum:
              - delivery
              - pickup
              - table
          description: Тип заказа
        - in: query
          name: payment_type
          schema:
            type: string
            enum:
              - cash
              - card
              - online
          description: Тип оплаты
        - in: query
          name: status
          schema:
            type: string
            enum:
              - accepted
              - progress
              - completed
              - ready
              - delivery
              - delivered
              - closed
              - canceled
          description: Статус заказа
        - in: query
          name: source
          schema:
            type: string
            enum:
              - site
              - webview
              - telegram
              - external
          description: Источник заказа
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Номер страницы
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
          description: Количество записей на странице
      responses:
        '200':
          description: Список заказов
          content:
            application/json:
              schema:
                type: object
                required:
                  - orders
                properties:
                  orders:
                    type: array
                    items:
                      $ref: '#/components/schemas/AdminOrderListItem'
                  next:
                    type: integer
                    description: Номер следующей страницы, если в выдаче есть продолжение
                    example: 2
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
  /orders/{id}:
    get:
      tags:
        - Заказы
      summary: Заказ по ID
      description: Возвращает один заказ панели по внутреннему ID.
      security:
        - BearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/Lang'
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Заказ
          content:
            application/json:
              schema:
                type: object
                required:
                  - order
                properties:
                  order:
                    $ref: '#/components/schemas/AdminOrder'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
  /guests:
    get:
      tags:
        - Гости
      summary: Поиск гостей
      description: Возвращает список гостей панели по городу и поисковой строке.
      security:
        - BearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/Lang'
        - in: query
          name: city_id
          schema:
            type: integer
            minimum: 1
          description: ID города
        - in: query
          name: query
          schema:
            type: string
            example: '79000000001'
          description: Поиск по телефону или email
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Номер страницы
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
          description: Количество записей на странице
      responses:
        '200':
          description: Список гостей
          content:
            application/json:
              schema:
                type: object
                required:
                  - guests
                properties:
                  guests:
                    type: array
                    items:
                      $ref: '#/components/schemas/AdminGuestListItem'
                  next:
                    type: integer
                    description: Номер следующей страницы, если в выдаче есть продолжение
                    example: 2
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
  /guests/{id}:
    get:
      tags:
        - Гости
      summary: Гость по ID
      description: Возвращает одного гостя панели по внутреннему ID.
      security:
        - BearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/Lang'
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Гость
          content:
            application/json:
              schema:
                type: object
                required:
                  - guest
                properties:
                  guest:
                    $ref: '#/components/schemas/AdminGuest'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
  /auth/code/sms:
    post:
      tags:
        - Коды авторизации
      summary: Отправка кода авторизации SMS
      description: Отправляет код авторизации в SMS через текущий SMS-сервис сайта. Метод доступен администраторам.
      security:
        - BearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/Lang'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phone
                - code
              properties:
                phone:
                  type: string
                  pattern: '^\d+$'
                  description: Номер телефона в формате 7XXXXXXXXXX
                  example: '79000000001'
                code:
                  type: string
                  pattern: '^\d+$'
                  description: Код авторизации
                  example: '1234'
      responses:
        '200':
          $ref: '#/components/responses/StatusSuccess'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '424':
          $ref: '#/components/responses/FailedDependencyError'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
  /auth/code/call:
    post:
      tags:
        - Коды авторизации
      summary: Отправка кода дозвоном
      description: Отправляет код авторизации дозвоном через текущий SMS-сервис сайта. Метод доступен администраторам.
      security:
        - BearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/Lang'
      requestBody:
        required: true
