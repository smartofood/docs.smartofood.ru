webhooks:
  orderStatus:
    post:
      tags:
        - Вебхуки
      summary: HTTP-уведомление о статусе заказа
      description: |
        Smartofood отправляет POST-запрос на включенные адреса вебхуков, у которых в event_types указан тип события из поля event.

        Если для адреса задан secret, он передается в каждом запросе в заголовке X-Smartofood-Webhook-Secret-Token.

        Всего выполняется до 5 попыток доставки: первая сразу, вторая через 1 минуту, третья через 5 минут, четвертая через 15 минут, пятая через 1 час.

        Вебхуки отправляются с IP-адресов 158.160.27.41 и 158.160.59.130.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderWebhookNotification'
      responses:
        '2XX':
          description: Уведомление принято. Любой HTTP-статус 2xx считается успешной доставкой.
        '408':
          description: Доставка будет повторена
        '429':
          description: Доставка будет повторена
        '5XX':
          description: Доставка будет повторена

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Lang:
      in: header
      name: X-Lang
      schema:
        type: string
        enum:
          - ru
          - kk
          - en
          - es
        example: ru
      description: Заголовок для указания языка ответа
      required: false
    Id:
      in: path
      name: id
      schema:
        type: integer
        minimum: 1
      description: Идентификатор записи
      required: true
  schemas:
    AuthData:
      type: object
      required:
        - user_id
        - access_token
        - refresh_token
      properties:
        user_id:
          type: integer
          description: ID пользователя панели
          example: 1
        access_token:
          type: string
          description: JWT access token. В payload содержит `token_type`, `token_id` и `user_id`.
        refresh_token:
          type: string
          description: Refresh token
    Error:
      type: object
      required:
        - error
        - code
      properties:
        error:
          type: string
          example: Описание причины
        code:
          type: integer
          example: 400
    TwoStepAuthRequired:
      allOf:
        - $ref: '#/components/schemas/Error'
        - type: object
          required:
            - is_two_step_auth
          properties:
            is_two_step_auth:
              type: boolean
              description: Признак необходимости ввода кода двухэтапной авторизации
              example: true
    PasswordChangeRequired:
      allOf:
        - $ref: '#/components/schemas/Error'
        - type: object
          required:
            - is_force_change_pwd
            - password_change_token
          properties:
            is_force_change_pwd:
              type: boolean
              description: Признак обязательной смены пароля
              example: true
            password_change_token:
              type: string
              description: Короткоживущий JWT token для метода обязательной смены пароля
              example: eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9...
    Setting:
      type: object
      description: Форматированное значение настройки
      required:
        - name
        - value
        - raw
        - type
        - default
      properties:
        name:
          type: string
          description: Название настройки
          example: Количество записей на странице
        value:
          description: Форматированное значение настройки
          oneOf:
            - type: string
            - type: number
            - type: boolean
            - type: array
              items:
                type: string
        raw:
          description: Сырое значение настройки
          oneOf:
            - type: string
            - type: number
            - type: boolean
            - type: array
              items:
                type: string
        type:
          type: string
          description: Тип поля настройки
          example: number
        default:
          description: Значение по умолчанию
          oneOf:
            - type: string
            - type: number
            - type: boolean
            - type: 'null'
        data:
          type: object
          description: Доступные значения для select-настроек
          additionalProperties:
            type: string
